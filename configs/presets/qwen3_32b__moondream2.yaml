# ─────────────────────────────────────────────────────────────────
# Qwen3-32B + Moondream2
# Paper accuracy: 68.0% (Table 4, SCOPE HRI '26)
# ─────────────────────────────────────────────────────────────────

agent:
  slm:
    # ── Ollama ──
    backend: "ollama"
    model_id: "qwen3:32b"
    base_url: "${AGENT_API_BASE}"
    api_key: "${AGENT_API_KEY}"
    # ── vLLM (uncomment below, comment Ollama above) ──
    # backend: "vllm"
    # model_id: "Qwen/Qwen3-32B"
    # base_url: "${AGENT_API_BASE}"
    # api_key: "${AGENT_API_KEY}"
    temperature: 0.7
    max_tokens: 2048
    thinking: "toggle"

  vlm:
    backend: "moondream"
    api_key: "${MOONDREAM_API_KEY}"
    model_id: "vikhyatk/moondream2"
    # base_url: "${VLM_BASE_URL}"    # Uncomment for self-hosted VLM
